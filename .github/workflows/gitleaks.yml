name: Gitleaks Scan

on:
  push:
    branches: [ "main" ]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xvzf gitleaks_8.24.3_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks on app.py only
        run: |
          echo "===== FILE LIST ====="
          ls -l

          echo "===== APP.PY CONTENT ====="
          cat app.py

          echo "===== GITLEAKS SCAN (app.py only) ====="
          gitleaks dir -v app.py